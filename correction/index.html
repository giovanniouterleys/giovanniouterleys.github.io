<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correction de Texte</title>
    <script src="https://cdn.tailwindcss.com"></script> <!-- Optionnel : CDN Tailwind CSS -->
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-100">

    <div class="bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-xl font-bold mb-4">Correction de Texte</h1>
        <textarea id="inputText" rows="4" class="border p-2 w-full mb-4" placeholder="Saisissez votre texte ici..."></textarea>
        <button id="submitButton" class="bg-blue-500 text-white p-2 rounded">Corriger le texte</button>
        
        <div id="loader" class="hidden mt-4">Chargement...</div>
        <div id="result" class="mt-4"></div>
    </div>

    <script>
        document.getElementById('submitButton').addEventListener('click', async () => {
            const text = document.getElementById('inputText').value;
            const loader = document.getElementById('loader');
            const result = document.getElementById('result');

            loader.classList.remove('hidden'); // Affiche le loader
            result.innerHTML = ''; // Réinitialise le résultat

            try {
                const response = await fetch('https://correction-backend.onrender.com/api/correct-text', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ text })
                });

                if (!response.ok) {
                    throw new Error('Erreur lors de la requête');
                }

                const data = await response.json();
                loader.classList.add('hidden'); // Cache le loader

                // Affiche le texte corrigé et le coût
                result.innerHTML = `
                    <h2 class="font-bold">Texte corrigé :</h2>
                    <p>${data.correctedText}</p>
                    <h3 class="font-bold">Nombre de tokens utilisés : ${data.usedTokens}</h3>
                    <h3 class="font-bold">Coût estimé : $${data.estimatedCost}</h3>
                `;
            } catch (error) {
                loader.classList.add('hidden'); // Cache le loader
                result.innerHTML = `<p class="text-red-500">Erreur : ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
